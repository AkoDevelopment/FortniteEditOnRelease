name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build DLL
        run: msbuild FortniteEditOnRelease.vcxproj /p:Configuration=Release /p:Platform=x64

      - uses: actions/upload-artifact@v4
        with:
          name: FortniteEditOnRelease
          path: x64/Release/FortniteEditOnRelease.dll
